service: imagenet-lambda

frameworkVersion: "2"

provider:
  name: aws
  runtime: python3.10
  stage: dev
  region: us-east-1
  memorySize: 512
  timeout: 30
  environment:
    GCS_BUCKET: sls-dev0099
    MODEL_PATH: mobilenetV2.pt
    LABELS_PATH: imagenet_labels.json

package:
  exclude:
    - node_modules/**
    - .gitignore
    - .git/**
    - .serverless/**
    - venv/**
    - .venv/**
    - __pycache__/**
    - "*.pyc"

functions:
  predict:
    handler: main.handler
    events:
      - http:
          path: predict
          method: post
          cors: true
